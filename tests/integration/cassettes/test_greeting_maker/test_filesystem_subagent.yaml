          ## Instructions

          - For general conversation or questions that don't need skills, respond directly
          - Use execute_skill to delegate work to a skill
          - Each skill runs as an isolated agent with NO shared memory or context. A skill can only see what you put in its request — it has no access to the conversation, previous skill results, or any other context
