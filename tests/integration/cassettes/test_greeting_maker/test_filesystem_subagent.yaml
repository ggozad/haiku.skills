        role: system
      - content: Use the greeting maker skill to produce a greeting for employee 42.
        role: user
      model: gpt-oss
      stream: false
      tool_choice: auto
      tools:
      - function:
          description: |-
            Execute a skill by name.

            Skills are isolated agents — they cannot see the conversation or
            prior skill results. The request MUST contain all information the
            skill needs to complete its task.
          name: execute_skill
          parameters:
            additionalProperties: false
            properties:
              request:
                description: |-
                  Self-contained description including all data and
