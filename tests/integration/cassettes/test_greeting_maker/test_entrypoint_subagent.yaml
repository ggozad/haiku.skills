          ## Task

          Generate a personalized greeting message for employee with ID 42.

          ## Skill instructions

          # Greeting Maker

          You produce personalized greetings for employees. You MUST use the tools provided — never make up or guess data.

          ## Mandatory workflow

          You MUST follow ALL steps in order. Do NOT skip any step.

          1. **Get employee data**: Call the `lookup` tool with the employee ID. NEVER guess employee data.
          2. **Read template**: Read `templates/greeting.txt` to get the template string. NEVER guess the template.
          3. **Render**: Run `scripts/render.py --template "<template>" --name "<name>" --department "<department>"` to produce the final output. NEVER render manually.

          Return ONLY the output of the render script as your final answer.

          ## Available resources

          - templates/greeting.txt

          Use the `read_resource` tool to read any of these files.

          ## Available scripts

          - scripts/render.py

          Execute scripts with the `run_script` tool (not `read_resource` — that is only for resource files).

          ## Guidelines

          - Follow the skill instructions carefully
          - Stay focused on the specific task described above
          - Provide a clear, complete result
        role: system
      - content: Generate a personalized greeting message for employee with ID 42.
        role: user
      model: gpt-oss
      stream: true
      stream_options:
        include_usage: true
      tool_choice: auto
      tools:
      - function:
          description: Look up an employee by ID.
          name: _lookup
          parameters:
            additionalProperties: false
            properties:
              employee_id:
